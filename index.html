<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slime Mould Type</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
  const INITIAL_TEXT = "Type in anything to see it grow!";
  const DECAY = 0.96;
  const HEX_COLOR = "#E6E800";

  let trailMap;
  const AGENT_COUNT = 1000;
  const SENSOR_DIST = 10;
  const SENSOR_ANGLE = Math.PI / 4;
  const ROTATION_ANGLE = Math.PI / 6;
  const STEP_SIZE = 0.96;
  const DIFFUSION = 0.25;

  let trailColorObj;
  let fontSize = 64;
  let fontFamily = "monospace";
  let margin = 40;
  let linegap = 1.2;
  let maxWidth;
  let typedText = "";
  let letterMetas = [];
  let allAgentGroups = [];
  let letterBuffer;

  function setup() {
    createCanvas(windowWidth, windowHeight);
    pixelDensity(1);
    maxWidth = width - 2 * margin;
    trailMap = createGraphics(width, height);
    trailMap.background(0);
    textFont(fontFamily);
    textSize(fontSize);
    letterBuffer = createGraphics(width, height);
    trailColorObj = color(HEX_COLOR);
    trailColorObj.setAlpha(100);
    if (INITIAL_TEXT && INITIAL_TEXT.length > 0) {
      typedText = INITIAL_TEXT;
      layoutTypedText(typedText);
      for (let meta of letterMetas) {
        if (meta.char !== " " && meta.char !== "\n") {
          let borderPixels = getLetterBorderPixels(meta.char, meta.x, meta.y);
          if (borderPixels.length > 0) {
            let agents = [];
            for (let i = 0; i < AGENT_COUNT; i++) {
              let idx = floor(random(borderPixels.length));
              let bp = borderPixels[idx];
              let jitter = p5.Vector.random2D().mult(random(0, 2));
              let pos = createVector(bp.x, bp.y).add(jitter);
              let angle = random(TWO_PI);
              agents.push(new Agent(pos.x, pos.y, angle));
            }
            allAgentGroups.push({ agents: agents });
          }
        }
      }
    }
  }

  function draw() {
    for (let group of allAgentGroups) {
      for (let agent of group.agents) {
        agent.update();
        agent.deposit(trailMap);
      }
    }
    trailMap.loadPixels();
    for (let x = 1; x < width - 1; x++) {
      for (let y = 1; y < height - 1; y++) {
        let idx = 4 * (x + y * width);
        for (let c = 0; c < 3; c++) {
          let avg = 0;
          for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
              let nIdx = 4 * (x + dx + (y + dy) * width) + c;
              avg += trailMap.pixels[nIdx];
            }
          }
          avg /= 9;
          trailMap.pixels[idx + c] = avg * DIFFUSION + trailMap.pixels[idx + c] * (1 - DIFFUSION);
        }
        trailMap.pixels[idx + 3] *= DECAY;
      }
    }
    trailMap.updatePixels();
    background(0);
    image(trailMap, 0, 0);
  }

  class Agent {
    constructor(x, y, angle) {
      this.pos = createVector(x, y);
      this.angle = angle;
    }
    update() {
      let sL = this.sense(this.angle - SENSOR_ANGLE);
      let sC = this.sense(this.angle);
      let sR = this.sense(this.angle + SENSOR_ANGLE);
      if (sL > sC && sL > sR) { this.angle -= ROTATION_ANGLE; }
      else if (sR > sC && sR > sL) { this.angle += ROTATION_ANGLE; }
      else { this.angle += random(-0.1, 0.1); }
      this.pos.x += cos(this.angle) * STEP_SIZE;
      this.pos.y += sin(this.angle) * STEP_SIZE;
      this.pos.x = (this.pos.x + width) % width;
      this.pos.y = (this.pos.y + height) % height;
    }
    sense(angle) {
      let sx = constrain(this.pos.x + cos(angle) * SENSOR_DIST, 0, width - 1);
      let sy = constrain(this.pos.y + sin(angle) * SENSOR_DIST, 0, height - 1);
      return trailMap.get(sx, sy);
    }
    deposit(pg) {
      pg.noStroke();
      pg.fill(trailColorObj);
      pg.ellipse(this.pos.x, this.pos.y, 1.5, 1.5);
    }
  }

  function getLetterBorderPixels(letter, x, y) {
    letterBuffer.clear();
    letterBuffer.textAlign(LEFT, TOP);
    letterBuffer.textFont(fontFamily);
    letterBuffer.textSize(fontSize);
    letterBuffer.fill(255);
    letterBuffer.noStroke();
    letterBuffer.text(letter, x, y);
    letterBuffer.loadPixels();
    let borderPixels = [];
    let w = textWidth(letter);
    for (let px = int(x) + 1; px < int(x + w) - 1; px++) {
      for (let py = int(y) + 1; py < int(y + fontSize * linegap) - 1 && py < height - 1; py++) {
        let idx = 4 * (px + py * width);
        if (letterBuffer.pixels[idx + 3] > 128) {
          let isEdge = false;
          for (let dx = -1; dx <= 1 && !isEdge; dx++) {
            for (let dy = -1; dy <= 1 && !isEdge; dy++) {
              if (dx === 0 && dy === 0) continue;
              if (letterBuffer.pixels[4 * (px + dx + (py + dy) * width) + 3] < 128) isEdge = true;
            }
          }
          if (isEdge) borderPixels.push({ x: px, y: py });
        }
      }
    }
    return borderPixels;
  }

  function layoutTypedText(txt) {
    letterMetas = [];
    textFont(fontFamily);
    textSize(fontSize);
    let x = margin, y = margin;
    for (let i = 0; i < txt.length; i++) {
      let ch = txt[i];
      if (ch === "\n") { y += fontSize * linegap; x = margin; continue; }
      if (ch === " ") { letterMetas.push({ char: " ", x, y }); x += textWidth(" "); continue; }
      let w = textWidth(ch);
      if (x + w > margin + maxWidth) { y += fontSize * linegap; x = margin; }
      letterMetas.push({ char: ch, x, y });
      x += w;
    }
  }

  function keyTyped() {
    if (key.length === 1 || key === " ") {
      typedText += key;
      layoutTypedText(typedText);
      let lastMeta = letterMetas[letterMetas.length - 1];
      if (lastMeta && lastMeta.char !== " " && lastMeta.char !== "\n") {
        let borderPixels = getLetterBorderPixels(lastMeta.char, lastMeta.x, lastMeta.y);
        if (borderPixels.length > 0) {
          let agents = [];
          for (let i = 0; i < AGENT_COUNT; i++) {
            let idx = floor(random(borderPixels.length));
            let bp = borderPixels[idx];
            let jitter = p5.Vector.random2D().mult(random(0, 2));
            let pos = createVector(bp.x, bp.y).add(jitter);
            agents.push(new Agent(pos.x, pos.y, random(TWO_PI)));
          }
          allAgentGroups.push({ agents });
        }
      }
    }
    return false;
  }

  function keyPressed() {
    if (keyCode === BACKSPACE) {
      if (typedText.length > 0) { typedText = typedText.slice(0, -1); layoutTypedText(typedText); }
      return false;
    }
    if (keyCode === ENTER || keyCode === RETURN) {
      typedText += "\n"; layoutTypedText(typedText); return false;
    }
  }
</script>
</body>
</html>
