<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physarum Decay Machine</title>
  <style>
    :root {
      --bg: #000000;
      --panel-bg: rgba(15, 15, 15, 0.85);
      --text: #ffffff;
      --accent: #E6E800;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: var(--bg); 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      color: var(--text);
    }
    canvas { display: block; }
    
    #ui-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 320px;
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      z-index: 10;
    }
    
    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 5px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    p.subtitle {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 20px;
    }

    .control-group { margin-bottom: 15px; }
    
    label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 5px;
      color: #ccc;
    }
    
    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 10px;
      border-radius: 6px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    
    input[type="file"] {
      width: 100%;
      font-size: 0.8rem;
      color: #ccc;
      margin-top: 5px;
      cursor: pointer;
    }
    
    /* File input styling */
    input[type="file"]::file-selector-button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      margin-right: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    input[type="file"]::file-selector-button:hover {
      background: rgba(255,255,255,0.2);
    }

    input[type="text"]:focus { border-color: var(--accent); }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }
    
    span.val { font-family: monospace; color: var(--accent); }
    
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 15px 0;
    }
  </style>
</head>
<body>

  <div id="ui-panel">
    <h1>Physarum Model</h1>
    <p class="subtitle">Interactive Slime Mold Simulation</p>

    <div class="control-group">
      <label for="textInput">Seed Text</label>
      <input type="text" id="textInput" value="SLIME">
    </div>
    
    <div class="control-group">
      <label for="imageUpload">...or Upload Image (PNG/SVG)</label>
      <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/svg+xml">
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>Decay (Fade)<span class="val" id="decayVal">0.96</span></label>
      <input type="range" id="decaySlider" min="0.80" max="0.99" step="0.01" value="0.96">
    </div>

    <div class="control-group">
      <label>Diffusion (Blur)<span class="val" id="diffVal">0.25</span></label>
      <input type="range" id="diffSlider" min="0" max="1" step="0.05" value="0.25">
    </div>

    <div class="control-group">
      <label>Sensor Angle<span class="val" id="saVal">45°</span></label>
      <input type="range" id="saSlider" min="10" max="90" step="1" value="45">
    </div>

    <div class="control-group">
      <label>Rotation Angle<span class="val" id="raVal">30°</span></label>
      <input type="range" id="raSlider" min="5" max="90" step="1" value="30">
    </div>
    
    <div class="control-group">
      <label>Step Size<span class="val" id="stepVal">1.5</span></label>
      <input type="range" id="stepSlider" min="0.1" max="5.0" step="0.1" value="1.5">
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    // --- SIMULATION PARAMETERS ---
    const AGENTS_PER_LETTER = 2000; 
    const SENSOR_DIST = 10;
    const HEX_COLOR = "#E6E800";

    // Dynamic Variables linked to UI
    let textSeed = "SLIME";
    let imageSeed = null; // Holds the uploaded p5 image
    let decayFactor = 0.96;
    let diffusionFactor = 0.25;
    let sensorAngle = Math.PI / 4;
    let rotationAngle = Math.PI / 6;
    let stepSize = 1.5;

    // Rendering internals
    let trailMap, letterBuffer, trailColorObj;
    let allAgents = [];
    let fontSize = 120;
    let fontFamily = "monospace";

    // --- UI EVENT LISTENERS ---
    
    // Text Input Listener
    document.getElementById("textInput").addEventListener("input", (e) => {
      textSeed = e.target.value;
      imageSeed = null; // Clear the image if typing text
      document.getElementById("imageUpload").value = ""; // Reset file input UI
      spawnAgents();
    });
    
    // Image Upload Listener
    document.getElementById("imageUpload").addEventListener("change", function(e) {
      let file = e.target.files;
      if (!file) return;
      
      let reader = new FileReader();
      reader.onload = function(event) {
        // Load the image into p5's memory
        loadImage(event.target.result, function(img) {
          imageSeed = img;
          textSeed = ""; // Clear text
          document.getElementById("textInput").value = ""; // Reset text UI
          spawnAgents();
        });
      };
      reader.readAsDataURL(file);
    });
    
    function bindSlider(id, valId, variableSetter, suffix = "") {
      const slider = document.getElementById(id);
      const valDisp = document.getElementById(valId);
      slider.addEventListener("input", (e) => {
        valDisp.innerText = e.target.value + suffix;
        variableSetter(parseFloat(e.target.value));
      });
    }

    bindSlider("decaySlider", "decayVal", v => decayFactor = v);
    bindSlider("diffSlider", "diffVal", v => diffusionFactor = v);
    bindSlider("stepSlider", "stepVal", v => stepSize = v);
    bindSlider("saSlider", "saVal", v => sensorAngle = v * (Math.PI / 180), "°");
    bindSlider("raSlider", "raVal", v => rotationAngle = v * (Math.PI / 180), "°");

    // --- P5.JS SETUP ---
    function setup() {
      createCanvas(windowWidth, windowHeight);
      pixelDensity(1); 
      
      trailMap = createGraphics(width, height);
      trailMap.background(0);
      
      letterBuffer = createGraphics(width, height);
      trailColorObj = color(HEX_COLOR);
      trailColorObj.setAlpha(120);

      spawnAgents();
    }

    // --- P5.JS DRAW LOOP ---
    function draw() {
      trailMap.loadPixels();
      let pixels = trailMap.pixels;

      for (let agent of allAgents) {
        agent.update(pixels);
      }

      let w4 = width * 4;
      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          let idx = 4 * (x + y * width);
          for (let c = 0; c < 3; c++) {
            let sum = 
              pixels[idx - 4 - w4 + c] + pixels[idx - w4 + c] + pixels[idx + 4 - w4 + c] +
              pixels[idx - 4 + c]      + pixels[idx + c]      + pixels[idx + 4 + c] +
              pixels[idx - 4 + w4 + c] + pixels[idx + w4 + c] + pixels[idx + 4 + w4 + c];
              
            let avg = sum / 9;
            pixels[idx + c] = avg * diffusionFactor + pixels[idx + c] * (1 - diffusionFactor);
          }
          pixels[idx + 3] *= decayFactor;
        }
      }
      trailMap.updatePixels();

      for (let agent of allAgents) {
        agent.deposit(trailMap);
      }

      background(0);
      image(trailMap, 0, 0);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      trailMap = createGraphics(width, height);
      trailMap.background(0);
      letterBuffer = createGraphics(width, height);
      spawnAgents();
    }

    // --- AGENT SPAWNING LOGIC ---
    function spawnAgents() {
      allAgents = [];
      trailMap.background(0); // Clear trail
      letterBuffer.clear();   // Clear hidden buffer

      // 1. Draw to the hidden buffer (Text OR Image)
      if (imageSeed) {
        // Calculate a scale so the image fits nicely on the screen (60% of window size)
        let scale = Math.min((width * 0.6) / imageSeed.width, (height * 0.6) / imageSeed.height);
        let w = imageSeed.width * scale;
        let h = imageSeed.height * scale;
        let x = (width - w) / 2;
        let y = (height - h) / 2;
        
        letterBuffer.image(imageSeed, x, y, w, h);
        
      } else if (textSeed.trim() !== "") {
        letterBuffer.textAlign(CENTER, CENTER);
        letterBuffer.textFont(fontFamily);
        letterBuffer.textSize(fontSize);
        letterBuffer.fill(255);
        letterBuffer.noStroke();
        letterBuffer.text(textSeed, width / 2, height / 2);
      } else {
        return; // Nothing to draw
      }

      // 2. Scan the buffer for pixels
      letterBuffer.loadPixels();
      let borderPixels = [];
      
      for (let px = 1; px < width - 1; px++) {
        for (let py = 1; py < height - 1; py++) {
          let idx = 4 * (px + py * width);
          
          if (letterBuffer.pixels[idx + 3] > 128) {
            let isEdge = false;
            for (let dx = -1; dx <= 1 && !isEdge; dx++) {
              for (let dy = -1; dy <= 1 && !isEdge; dy++) {
                if (dx === 0 && dy === 0) continue;
                if (letterBuffer.pixels[4 * (px + dx + (py + dy) * width) + 3] < 128) {
                  isEdge = true;
                }
              }
            }
            if (isEdge) borderPixels.push({ x: px, y: py });
          }
        }
      }

      if (borderPixels.length === 0) return;

      // 3. Spawn Agents
      // If text, scale agents by word length. If image, spawn a flat 10,000 agents.
      let totalAgents = imageSeed ? 10000 : (AGENTS_PER_LETTER * textSeed.length);
      
      for (let i = 0; i < totalAgents; i++) {
        let bp = random(borderPixels);
        let jitter = p5.Vector.random2D().mult(random(0, 2));
        allAgents.push(new Agent(bp.x + jitter.x, bp.y + jitter.y, random(TWO_PI)));
      }
    }

    // --- AGENT CLASS ---
    class Agent {
      constructor(x, y, angle) {
        this.pos = createVector(x, y);
        this.angle = angle;
      }
      update(pixels) {
        let sL = this.sense(this.angle - sensorAngle, pixels);
        let sC = this.sense(this.angle, pixels);
        let sR = this.sense(this.angle + sensorAngle, pixels);
        
        if (sL > sC && sL > sR) { this.angle -= rotationAngle; }
        else if (sR > sC && sR > sL) { this.angle += rotationAngle; }
        else { this.angle += random(-0.1, 0.1); }
        
        this.pos.x += cos(this.angle) * stepSize;
        this.pos.y += sin(this.angle) * stepSize;
        
        this.pos.x = (this.pos.x + width) % width;
        this.pos.y = (this.pos.y + height) % height;
      }
      sense(angle, pixels) {
        let sx = Math.floor(this.pos.x + Math.cos(angle) * SENSOR_DIST);
        let sy = Math.floor(this.pos.y + Math.sin(angle) * SENSOR_DIST);
        if (sx < 0 || sx >= width || sy < 0 || sy >= height) return 0;
        let idx = 4 * (sx + sy * width);
        return pixels[idx]; 
      }
      deposit(pg) {
        pg.noStroke();
        pg.fill(trailColorObj);
        pg.ellipse(this.pos.x, this.pos.y, 1.5, 1.5);
      }
    }
  </script>
</body>
</html>
