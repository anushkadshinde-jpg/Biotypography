<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physarum Decay Machine</title>
  <style>
    :root {
      --bg: #000000;
      --panel-bg: rgba(15, 15, 15, 0.85);
      --text: #ffffff;
      --accent: #E6E800;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: var(--bg); 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      color: var(--text);
    }
    canvas { display: block; }
    
    #ui-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 320px;
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      z-index: 10;
    }
    
    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 5px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    p.subtitle {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 20px;
    }

    .control-group { margin-bottom: 15px; }
    
    label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 5px;
      color: #ccc;
    }
    
    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 10px;
      border-radius: 6px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    
    input[type="file"] {
      width: 100%;
      font-size: 0.8rem;
      color: #ccc;
      margin-top: 5px;
      cursor: pointer;
    }
    
    input[type="file"]::file-selector-button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 6px 12px;
      border-radius: 4px;
      margin-right: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    input[type="file"]::file-selector-button:hover {
      background: rgba(255,255,255,0.2);
    }

    input[type="text"]:focus { border-color: var(--accent); }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }
    
    span.val { font-family: monospace; color: var(--accent); }
    
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 15px 0;
    }
  </style>
</head>
<body>

  <div id="ui-panel">
    <h1>Physarum Model</h1>
    <p class="subtitle">Interactive Slime Mold Simulation</p>

    <div class="control-group">
      <label for="textInput">Seed Text</label>
      <input type="text" id="textInput" value="SLIME">
    </div>
    
    <div class="control-group">
      <label for="imageUpload">...or Upload Image</label>
      <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/svg+xml">
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>Decay (Fade)<span class="val" id="decayVal">0.96</span></label>
      <input type="range" id="decaySlider" min="0.80" max="0.99" step="0.01" value="0.96">
    </div>

    <div class="control-group">
      <label>Diffusion (Blur)<span class="val" id="diffVal">0.25</span></label>
      <input type="range" id="diffSlider" min="0" max="1" step="0.05" value="0.25">
    </div>

    <div class="control-group">
      <label>Sensor Angle<span class="val" id="saVal">45°</span></label>
      <input type="range" id="saSlider" min="10" max="90" step="1" value="45">
    </div>

    <div class="control-group">
      <label>Rotation Angle<span class="val" id="raVal">30°</span></label>
      <input type="range" id="raSlider" min="5" max="90" step="1" value="30">
    </div>
    
    <div class="control-group">
      <label>Step Size<span class="val" id="stepVal">1.5</span></label>
      <input type="range" id="stepSlider" min="0.1" max="5.0" step="0.1" value="1.5">
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const AGENTS_PER_LETTER = 2000; 
    const SENSOR_DIST = 10;
    const HEX_COLOR = "#E6E800";

    let textSeed = "SLIME";
    let imageSeed = null; 
    let decayFactor = 0.96;
    let diffusionFactor = 0.25;
    let sensorAngle = Math.PI / 4;
    let rotationAngle = Math.PI / 6;
    let stepSize = 1.5;

    let trailMap, letterBuffer, trailColorObj;
    let allAgents = [];
    let fontSize = 120;
    let fontFamily = "monospace";

    // --- UI EVENT LISTENERS ---
    document.getElementById("textInput").addEventListener("input", (e) => {
      textSeed = e.target.value;
      imageSeed = null; 
      document.getElementById("imageUpload").value = ""; 
      spawnAgents();
    });
    
    // Bulletproof Native HTML Image Loader
    document.getElementById("imageUpload").addEventListener("change", function(e) {
      let file = e.target.files;
      if (!file) return;
      
      let isJpeg = (file.type === "image/jpeg" || file.type === "image/jpg");
      let reader = new FileReader();
      
      reader.onload = function(event) {
        let img = new Image();
        img.onload = function() {
          let w = img.naturalWidth || img.width || 800;
          let h = img.naturalHeight || img.height || 800;
          
          imageSeed = { element: img, width: w, height: h, isJpeg: isJpeg };
          textSeed = ""; 
          document.getElementById("textInput").value = ""; 
          spawnAgents();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });
    
    function bindSlider(id, valId, variableSetter, suffix = "") {
      const slider = document.getElementById(id);
      const valDisp = document.getElementById(valId);
      slider.addEventListener("input", (e) => {
        valDisp.innerText = e.target.value + suffix;
        variableSetter(parseFloat(e.target.value));
      });
    }

    bindSlider("decaySlider", "decayVal", v => decayFactor = v);
    bindSlider("diffSlider", "diffVal", v => diffusionFactor = v);
    bindSlider("stepSlider", "stepVal", v => stepSize = v);
    bindSlider("saSlider", "saVal", v => sensorAngle = v * (Math.PI / 180), "°");
    bindSlider("raSlider", "raVal", v => rotationAngle = v * (Math.PI / 180), "°");

    function setup() {
      createCanvas(windowWidth, windowHeight);
      pixelDensity(1);
